basePath: /api/v1
definitions:
  models.Anomaly:
    properties:
      anomalyGroupId:
        example: 1
        type: integer
      createdAt:
        example: "2024-01-15T10:30:00Z"
        type: string
      dataSource:
        example: SYNTHETIC
        type: string
      id:
        example: 1
        type: integer
      metadata:
        type: object
      signalStrength:
        example: -95.5
        type: number
      sourceId:
        example: 1
        type: integer
    type: object
  models.AnomalyGroupWithAnomalies:
    properties:
      anomalies:
        items:
          $ref: '#/definitions/models.Anomaly'
        type: array
      id:
        example: 1
        type: integer
      lastActivityAt:
        example: "2024-01-15T14:30:00Z"
        type: string
      latitude:
        example: 59.9139
        type: number
      longitude:
        example: 10.7522
        type: number
      mmsi:
        example: 123456789
        type: integer
      startedAt:
        example: "2024-01-15T10:30:00Z"
        type: string
      type:
        example: speed_anomaly
        type: string
    type: object
  models.BaseStation:
    properties:
      id:
        example: 1
        type: integer
      latitude:
        example: 58.96463228151012
        type: number
      longitude:
        example: 5.738597994470069
        type: number
      name:
        example: Stavanger
        type: string
    type: object
  models.ErrorResponse:
    properties:
      error:
        example: invalid_request
        type: string
      message:
        example: The request parameters are invalid
        type: string
    type: object
  models.GeoJSONFeature:
    properties:
      geometry:
        $ref: '#/definitions/models.GeoJSONGeometry'
      properties:
        type: object
      type:
        example: Feature
        type: string
    type: object
  models.GeoJSONFeatureCollection:
    properties:
      features:
        items:
          $ref: '#/definitions/models.GeoJSONFeature'
        type: array
      type:
        example: FeatureCollection
        type: string
    type: object
  models.GeoJSONGeometry:
    properties:
      coordinates:
        example:
        - 10.7522
        - 59.9139
        items:
          type: number
        type: array
      type:
        example: Point
        type: string
    type: object
host: localhost:3000
info:
  contact: {}
  description: API for querying AIS anomaly detection data
  title: AIS Anomaly Detection API
  version: "1.0"
paths:
  /anomaly-groups:
    get:
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      - description: MMSI filter
        in: query
        name: mmsi
        type: integer
      - description: Anomaly type filter
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.GeoJSONFeatureCollection'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get anomaly groups with optional filters
      tags:
      - anomaly-groups
  /anomaly-groups/{id}:
    get:
      parameters:
      - description: Anomaly Group ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AnomalyGroupWithAnomalies'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get anomaly group by ID
      tags:
      - anomaly-groups
  /anomaly-groups/mmsi/{mmsi}:
    get:
      parameters:
      - description: MMSI
        in: path
        name: mmsi
        required: true
        type: integer
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.GeoJSONFeatureCollection'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get anomaly groups by MMSI
      tags:
      - anomaly-groups
  /base-stations:
    get:
      description: Returns all base stations along the Norwegian coast as GeoJSON
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.GeoJSONFeatureCollection'
      summary: Get all base stations
      tags:
      - base-stations
  /base-stations/{id}:
    get:
      description: Returns a single base station by its ID
      parameters:
      - description: Base Station ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.BaseStation'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get base station by ID
      tags:
      - base-stations
swagger: "2.0"
